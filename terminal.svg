<svg width="900" height="220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="termBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
  </defs>

  <!-- Terminal window -->
  <rect width="900" height="220" fill="url(#termBg)" rx="10" stroke="#30363d" stroke-width="1"/>

  <!-- Title bar -->
  <rect width="900" height="32" fill="#21262d" rx="10"/>
  <rect y="20" width="900" height="12" fill="#21262d"/>

  <!-- Window buttons -->
  <circle cx="20" cy="16" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="16" r="6" fill="#febc2e"/>
  <circle cx="60" cy="16" r="6" fill="#28c840"/>

  <!-- Terminal title -->
  <text x="450" y="21" font-family="'Courier New', monospace" font-size="12"
    text-anchor="middle" fill="#8b949e">durgesh@cloud ~ bash</text>

  <!-- Line 1 -->
  <text x="20" y="60" font-family="'Courier New', monospace" font-size="13" fill="#e94560" opacity="0">
    $
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="0.3s" fill="freeze"/>
  </text>
  <text x="32" y="60" font-family="'Courier New', monospace" font-size="13" fill="#a8b2d8" opacity="0">
    whoami
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="0.5s" fill="freeze"/>
  </text>
  <text x="20" y="78" font-family="'Courier New', monospace" font-size="13" fill="#38bdf8" opacity="0">
    → Durgesh Verma | Sr. Tech Consultant | 6+ Years Experience
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="0.9s" fill="freeze"/>
  </text>

  <!-- Line 2 -->
  <text x="20" y="100" font-family="'Courier New', monospace" font-size="13" fill="#e94560" opacity="0">
    $
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.3s" fill="freeze"/>
  </text>
  <text x="32" y="100" font-family="'Courier New', monospace" font-size="13" fill="#a8b2d8" opacity="0">
    cat certifications.txt
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.5s" fill="freeze"/>
  </text>
  <text x="20" y="118" font-family="'Courier New', monospace" font-size="13" fill="#a78bfa" opacity="0">
    → AZ-305 · AZ-400 · AZ-104 · GCP-ACE · Cognite CDF (x3)
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.9s" fill="freeze"/>
  </text>

  <!-- Line 3 -->
  <text x="20" y="140" font-family="'Courier New', monospace" font-size="13" fill="#e94560" opacity="0">
    $
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="2.3s" fill="freeze"/>
  </text>
  <text x="32" y="140" font-family="'Courier New', monospace" font-size="13" fill="#a8b2d8" opacity="0">
    ls current_stack/
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="2.5s" fill="freeze"/>
  </text>
  <text x="20" y="158" font-family="'Courier New', monospace" font-size="13" fill="#28c840" opacity="0">
    → AWS  Azure  GCP  Kubernetes  Terraform  Kafka  Spark  Databricks  Cognite
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="2.9s" fill="freeze"/>
  </text>

  <!-- Line 4 - prompt with blinking cursor -->
  <text x="20" y="192" font-family="'Courier New', monospace" font-size="13" fill="#e94560" opacity="0">
    $
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="3.3s" fill="freeze"/>
  </text>
  <text x="32" y="192" font-family="'Courier New', monospace" font-size="13" fill="#febc2e" opacity="0">
    █
    <animate attributeName="opacity" values="0;1" dur="0.1s" begin="3.5s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1" dur="1s" begin="3.5s" repeatCount="indefinite"/>
  </text>
</svg>
