<svg width="900" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="12"/>

  <!-- Animated grid lines -->
  <g opacity="0.07" stroke="#e94560" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- Floating particles -->
  <circle cx="50" cy="30" r="2" fill="#e94560" opacity="0.6">
    <animate attributeName="cy" values="30;170;30" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="150" r="1.5" fill="#a78bfa" opacity="0.5">
    <animate attributeName="cy" values="150;20;150" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="60" r="2" fill="#38bdf8" opacity="0.4">
    <animate attributeName="cy" values="60;160;60" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="400;420;400" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="100" r="1.5" fill="#e94560" opacity="0.5">
    <animate attributeName="cy" values="100;40;100" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="850" cy="50" r="2" fill="#a78bfa" opacity="0.4">
    <animate attributeName="cy" values="50;150;50" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="170" r="1" fill="#38bdf8" opacity="0.6">
    <animate attributeName="cy" values="170;30;170" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Pulse ring -->
  <circle cx="450" cy="100" r="60" fill="none" stroke="#e94560" stroke-width="0.5" opacity="0.2">
    <animate attributeName="r" values="60;90;60" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0;0.2" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="100" r="80" fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.15">
    <animate attributeName="r" values="80;110;80" dur="4s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0;0.15" dur="4s" begin="1s" repeatCount="indefinite"/>
  </circle>

  <!-- Main name with glow -->
  <text x="450" y="85" font-family="'Courier New', monospace" font-size="42" font-weight="bold"
    text-anchor="middle" fill="url(#textGrad)" filter="url(#glow)">
    DURGESH VERMA
    <animate attributeName="opacity" values="0;1" dur="1.5s" fill="freeze"/>
  </text>

  <!-- Animated typing subtitle -->
  <text x="450" y="118" font-family="'Courier New', monospace" font-size="14"
    text-anchor="middle" fill="#a8b2d8" letter-spacing="2">
    Sr. Tech Consultant  |  Cloud · DevOps · DataOps · MLOps
    <animate attributeName="opacity" values="0;1" dur="2s" begin="0.8s" fill="freeze"/>
  </text>

  <!-- Blinking cursor -->
  <text x="718" y="118" font-family="'Courier New', monospace" font-size="14" fill="#e94560">
    _
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </text>

  <!-- Bottom tech tags -->
  <g font-family="'Courier New', monospace" font-size="11" fill="#38bdf8" opacity="0.8">
    <text x="90" y="155">
      [ AWS ]
      <animate attributeName="opacity" values="0;0.8" dur="0.5s" begin="1.5s" fill="freeze"/>
    </text>
    <text x="175" y="155">
      [ Azure ]
      <animate attributeName="opacity" values="0;0.8" dur="0.5s" begin="1.7s" fill="freeze"/>
    </text>
    <text x="270" y="155">
      [ GCP ]
      <animate attributeName="opacity" values="0;0.8" dur="0.5s" begin="1.9s" fill="freeze"/>
    </text>
    <text x="355" y="155">
      [ Kubernetes ]
      <animate attributeName="opacity" values="0;0.8" dur="0.5s" begin="2.1s" fill="freeze"/>
    </text>
    <text x="490" y="155">
      [ Terraform ]
      <animate attributeName="opacity" values="0;0.8" dur="0.5s" begin="2.3s" fill="freeze"/>
    </text>
    <text x="610" y="155">
      [ Cognite CDF ]
      <animate attributeName="opacity" values="0;0.8" dur="0.5s" begin="2.5s" fill="freeze"/>
    </text>
    <text x="750" y="155">
      [ MLOps ]
      <animate attributeName="opacity" values="0;0.8" dur="0.5s" begin="2.7s" fill="freeze"/>
    </text>
  </g>

  <!-- Bottom accent line -->
  <rect y="188" width="900" height="3" rx="2">
    <animate attributeName="width" values="0;900" dur="2s" fill="freeze"/>
    <animate attributeName="fill" values="#e94560;#a78bfa" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>
